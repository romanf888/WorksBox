<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorksBox - Cours dans le Cloud</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800">
    
    <div id="root">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; padding: 20px;">
            <div style="width: 50px; height: 50px; border: 4px solid #cbd5e1; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
            <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
            <h2 style="font-size: 1.5rem; font-weight: bold; color: #1e293b; margin-bottom: 10px; font-family: sans-serif;">Chargement de WorksBox...</h2>
        </div>
    </div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, onSnapshot, doc, updateDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const { useState, useEffect, useMemo } = React;

        const appId = 'lycee-share'; 
        const firebaseConfig = {
          apiKey: "AIzaSyByfCCHmBsbxhXszVA7Rhoe3VBgBNeKgK8",
          authDomain: "lycee-share.firebaseapp.com",
          projectId: "lycee-share",
          storageBucket: "lycee-share.firebasestorage.app",
          messagingSenderId: "578872424130",
          appId: "1:578872424130:web:670f646b295dd4fe2dad5b",
          measurementId: "G-3Q6998C0JH"
        };
        
        let db = null;
        let auth = null;

        try {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {}

        // === Icônes ===
        const Icon = ({ children, className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{children}</svg>;
        const BookOpen = ({className}) => <Icon className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>;
        const Calculator = ({className}) => <Icon className={className}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></Icon>;
        const Folder = ({className}) => <Icon className={className}><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></Icon>;
        const FileText = ({className}) => <Icon className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></Icon>;
        const ChevronLeft = ({className}) => <Icon className={className}><polyline points="15 18 9 12 15 6"/></Icon>;
        const ChevronDown = ({className}) => <Icon className={className}><polyline points="6 9 12 15 18 9"/></Icon>;
        const ChevronUp = ({className}) => <Icon className={className}><polyline points="18 15 12 9 6 15"/></Icon>;
        const Search = ({className}) => <Icon className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></Icon>;
        const X = ({className}) => <Icon className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
        const Eye = ({className}) => <Icon className={className}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></Icon>;
        const ExternalLink = ({className}) => <Icon className={className}><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></Icon>;
        const Shield = ({className}) => <Icon className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></Icon>;
        const HelpCircle = ({className}) => <Icon className={className}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></Icon>;
        const HomeIcon = ({className}) => <Icon className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></Icon>;
        const Megaphone = ({className}) => <Icon className={className}><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></Icon>;

        const COLOR_PALETTES = {
            blue: 'bg-blue-100 text-blue-700 border-blue-200',
            purple: 'bg-purple-100 text-purple-700 border-purple-200',
            orange: 'bg-orange-100 text-orange-700 border-orange-200',
            rose: 'bg-rose-100 text-rose-700 border-rose-200',
            red: 'bg-red-100 text-red-700 border-red-200',
            green: 'bg-green-100 text-green-700 border-green-200',
            teal: 'bg-teal-100 text-teal-700 border-teal-200',
            slate: 'bg-slate-100 text-slate-700 border-slate-200'
        };

        const DEFAULT_SUBJECTS = ["Allemand", "Anglais", "Enseignement technologique en anglais", "Histoire Géographie", "Ingénierie et développement durable", "Mathématiques", "Philosophie", "Physique Chimie", "SIN"];

        function App() {
          const [currentView, setCurrentView] = useState('home');
          const [selectedSubject, setSelectedSubject] = useState(null);
          const [searchQuery, setSearchQuery] = useState('');
          const [courses, setCourses] = useState([]);
          const [settings, setSettings] = useState({ subjectOrder: DEFAULT_SUBJECTS, tagColors: {} });
          const [isLoading, setIsLoading] = useState(true);
          const [user, setUser] = useState(null);
          const [previewData, setPreviewData] = useState(null);

          const activeSubjects = useMemo(() => {
              const subs = new Set([...DEFAULT_SUBJECTS, ...courses.map(c => c.subject)]);
              return Array.from(subs).sort();
          }, [courses]);

          const sortedSubjects = useMemo(() => {
              const ordered = settings.subjectOrder || [];
              const known = ordered.filter(s => activeSubjects.includes(s));
              const unknown = activeSubjects.filter(s => !ordered.includes(s)).sort();
              return [...known, ...unknown];
          }, [activeSubjects, settings.subjectOrder]);

          useEffect(() => {
            if (!auth) return;
            const initAuth = async () => { try { await signInAnonymously(auth); } catch (e) { setIsLoading(false); } };
            initAuth();
            return onAuthStateChanged(auth, setUser);
          }, []);

          useEffect(() => {
            if (!auth || !user || !db) return;
            
            const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global');
            const unsubSettings = onSnapshot(settingsRef, (doc) => { if (doc.exists()) setSettings(doc.data()); });

            const coursesRef = collection(db, 'artifacts', appId, 'public', 'data', 'courses');
            const unsubCourses = onSnapshot(coursesRef, (snapshot) => {
              const loadedCourses = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              // Sur le site public, on ne garde que les cours VISIBLES
              const publicCourses = loadedCourses.filter(c => c.isVisible !== false);
              setCourses(publicCourses);
              setIsLoading(false);
            }, () => setIsLoading(false));

            return () => { unsubSettings(); unsubCourses(); };
          }, [user]);

          const chaptersData = useMemo(() => {
            if (!selectedSubject) return [];
            const filtered = courses.filter(c => c.subject === selectedSubject);
            const groups = {};
            filtered.forEach(course => {
                if (!groups[course.chapter]) groups[course.chapter] = { name: course.chapter, courses: [] };
                groups[course.chapter].courses.push(course);
            });
            Object.values(groups).forEach(group => {
                group.chapterOrder = Math.min(...group.courses.map(c => c.chapterOrder || 0));
                group.courses.sort((a, b) => (a.courseOrder||0) - (b.courseOrder||0));
            });
            return Object.values(groups).sort((a, b) => a.chapterOrder - b.chapterOrder);
          }, [courses, selectedSubject]);

          const filteredSubjects = sortedSubjects.filter(subject => subject.toLowerCase().includes(searchQuery.toLowerCase()));

          const openSubject = (s) => { setSelectedSubject(s); setCurrentView('subject'); setSearchQuery(''); };
          const goHome = () => { setSelectedSubject(null); setCurrentView('home'); setSearchQuery(''); };
          const openTerms = () => { setSelectedSubject(null); setCurrentView('terms'); };
          const openCasioGuide = () => { setSelectedSubject(null); setCurrentView('casioGuide'); };

          // Fonction pour incrémenter les vues et ouvrir la modale
          const handleView = async (course, type) => {
              if (type === 'Numérique') setPreviewData({ link: course.digitalLink, title: course.title, type: 'Numérique' });
              else if (type === 'Casio') setPreviewData({ link: course.casioLink, title: course.title, type: 'Casio' });

              if (db && user) {
                  try {
                      const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'courses', course.id.toString());
                      const updates = {};
                      if (type === 'Numérique') updates.viewsDigital = (course.viewsDigital || 0) + 1;
                      if (type === 'Casio') updates.viewsCasio = (course.viewsCasio || 0) + 1;
                      await updateDoc(docRef, updates);
                  } catch(e) { console.error(e); }
              }
          };

          return (
            <div className="min-h-screen bg-slate-50 font-sans text-slate-800">
              {settings.announcement && (
                  <div className="bg-amber-500 text-white text-sm font-bold py-2 px-4 flex justify-center items-center">
                      <Megaphone className="w-4 h-4 mr-2" />
                      {settings.announcement}
                  </div>
              )}

              <nav className="bg-slate-900 text-white shadow-lg sticky top-0 z-10">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex justify-between items-center h-16">
                    <div className="flex items-center space-x-8">
                        <div className="flex items-center space-x-3 cursor-pointer" onClick={goHome}>
                            <div className="bg-blue-500 p-2 rounded-lg">
                                <BookOpen className="w-6 h-6 text-white" />
                            </div>
                            <span className="font-bold text-xl tracking-tight">WorksBox</span>
                        </div>
                        
                        <div className="hidden lg:flex items-center space-x-6">
                            <button onClick={goHome} className={`text-sm font-medium flex items-center transition-colors hover:text-white ${(currentView === 'home' || currentView === 'subject') ? 'text-white border-b-2 border-blue-500 pb-1 mt-1' : 'text-slate-400'}`}>
                                <HomeIcon className="w-4 h-4 mr-1.5" /> Accueil
                            </button>
                            <button onClick={openTerms} className={`text-sm font-medium flex items-center transition-colors hover:text-white ${currentView === 'terms' ? 'text-white border-b-2 border-blue-500 pb-1 mt-1' : 'text-slate-400'}`}>
                                <Shield className="w-4 h-4 mr-1.5" /> Conditions d'utilisations
                            </button>
                            <button onClick={openCasioGuide} className={`text-sm font-medium flex items-center transition-colors hover:text-white ${currentView === 'casioGuide' ? 'text-white border-b-2 border-blue-500 pb-1 mt-1' : 'text-slate-400'}`}>
                                <HelpCircle className="w-4 h-4 mr-1.5" /> Tuto Calculatrice
                            </button>
                        </div>
                    </div>
                  </div>
                </div>

                <div className="lg:hidden border-t border-slate-800 bg-slate-900 px-4 py-2 flex space-x-6 overflow-x-auto scrollbar-hide">
                    <button onClick={goHome} className={`whitespace-nowrap flex items-center text-xs font-medium py-1 transition-colors ${(currentView === 'home' || currentView === 'subject') ? 'text-white border-b border-blue-500' : 'text-slate-400'}`}>
                        <HomeIcon className="w-3.5 h-3.5 mr-1.5" /> Accueil
                    </button>
                    <button onClick={openTerms} className={`whitespace-nowrap flex items-center text-xs font-medium py-1 transition-colors ${currentView === 'terms' ? 'text-white border-b border-blue-500' : 'text-slate-400'}`}>
                        <Shield className="w-3.5 h-3.5 mr-1.5" /> Conditions
                    </button>
                    <button onClick={openCasioGuide} className={`whitespace-nowrap flex items-center text-xs font-medium py-1 transition-colors ${currentView === 'casioGuide' ? 'text-white border-b border-blue-500' : 'text-slate-400'}`}>
                        <HelpCircle className="w-3.5 h-3.5 mr-1.5" /> Tuto Casio
                    </button>
                </div>
              </nav>

              <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                {isLoading ? (
                    <div className="flex flex-col items-center justify-center py-20">
                        <div className="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>
                        <p className="text-slate-500 font-medium">Chargement des cours...</p>
                    </div>
                ) : (
                    <>
                        {currentView === 'home' && (
                        <div className="space-y-8 animate-in fade-in duration-300">
                            <div className="text-center max-w-2xl mx-auto mb-10">
                            <h1 className="text-4xl font-extrabold text-slate-900 mb-4">Ressources & Cours</h1>
                            <p className="text-lg text-slate-600">Accédez à tous les cours au format numérique et optimisés pour calculatrice Casio.</p>
                            </div>

                            <div className="max-w-md mx-auto relative">
                                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <Search className="h-5 w-5 text-slate-400" />
                                </div>
                                <input type="text" className="block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-xl leading-5 bg-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm shadow-sm transition-shadow" placeholder="Rechercher une matière..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mt-8">
                            {filteredSubjects.map((subject, index) => {
                                const courseCount = courses.filter(c => c.subject === subject).length;
                                return (
                                <div key={index} onClick={() => openSubject(subject)} className="bg-white rounded-xl p-6 shadow-sm border border-slate-200 hover:shadow-md hover:border-blue-400 cursor-pointer transition-all group flex items-start space-x-4">
                                    <div className="bg-blue-50 text-blue-600 p-3 rounded-lg group-hover:bg-blue-600 group-hover:text-white transition-colors">
                                        <Folder className="w-8 h-8" />
                                    </div>
                                    <div>
                                        <h3 className="text-lg font-bold text-slate-900 mb-1 group-hover:text-blue-700 transition-colors">{subject}</h3>
                                        <p className="text-sm text-slate-500 font-medium">{courseCount} document{courseCount !== 1 ? 's' : ''}</p>
                                    </div>
                                </div>
                                );
                            })}
                            {filteredSubjects.length === 0 && (
                                <div className="col-span-full text-center py-12 text-slate-500">Aucune matière trouvée.</div>
                            )}
                            </div>
                        </div>
                        )}

                        {currentView === 'subject' && (
                        <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-300">
                            <div className="flex items-center space-x-4 mb-8">
                                <button onClick={goHome} className="p-2 bg-white border border-slate-200 rounded-full text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors shadow-sm"><ChevronLeft className="w-5 h-5" /></button>
                                <h1 className="text-3xl font-bold text-slate-900">{selectedSubject}</h1>
                            </div>

                            {chaptersData.length === 0 ? (
                            <div className="bg-white border border-dashed border-slate-300 rounded-2xl p-12 text-center flex flex-col items-center">
                                <div className="bg-slate-100 p-4 rounded-full mb-4"><FileText className="w-10 h-10 text-slate-400" /></div>
                                <h3 className="text-xl font-bold text-slate-800 mb-2">Aucun cours disponible</h3>
                                <p className="text-slate-500 max-w-md">Il n'y a pas encore de cours liés pour cette matière. Revenez plus tard !</p>
                            </div>
                            ) : (
                            <div className="space-y-6">
                                {chaptersData.map((chapterGroup) => (
                                    <ChapterBlock key={chapterGroup.name} chapter={chapterGroup.name} chapterCourses={chapterGroup.courses} handleView={handleView} tagColors={settings.tagColors} />
                                ))}
                            </div>
                            )}
                        </div>
                        )}

                        {/* VUES TUTO / CGU */}
                        {currentView === 'casioGuide' && (
                          <div className="space-y-8 animate-in fade-in duration-300 max-w-4xl mx-auto">
                            <h1 className="text-3xl font-extrabold text-slate-900 flex items-center">
                                <div className="bg-blue-100 p-3 rounded-xl mr-4"><HelpCircle className="w-8 h-8 text-blue-600"/></div> Comment mettre des cours sur Casio ?
                            </h1>
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 sm:p-10 space-y-8">
                                <div>
                                    <h3 className="text-xl font-bold text-slate-800 flex items-center mb-3"><span className="bg-slate-800 text-white w-7 h-7 rounded-full flex items-center justify-center text-sm mr-3">1</span>Le matériel et le logiciel</h3>
                                    <p className="text-slate-600 leading-relaxed ml-10">Vous aurez besoin du câble USB fourni avec votre calculatrice. Pour les modèles Graph 35+ / 90+ E, téléchargez et installez le logiciel gratuit <strong>Casio FA-124</strong> sur votre ordinateur.</p>
                                </div>
                                <div>
                                    <h3 className="text-xl font-bold text-slate-800 flex items-center mb-3"><span className="bg-slate-800 text-white w-7 h-7 rounded-full flex items-center justify-center text-sm mr-3">2</span>Préparer les fichiers</h3>
                                    <p className="text-slate-600 leading-relaxed ml-10">Téléchargez les fichiers au format <strong>.txt</strong> ou <strong>.g1m</strong> depuis WorksBox (en cliquant sur "Version Casio").</p>
                                </div>
                                <div>
                                    <h3 className="text-xl font-bold text-slate-800 flex items-center mb-3"><span className="bg-slate-800 text-white w-7 h-7 rounded-full flex items-center justify-center text-sm mr-3">3</span>Le transfert étape par étape</h3>
                                    <div className="ml-10 bg-slate-50 p-6 rounded-xl border border-slate-100">
                                        <ul className="list-disc list-outside text-slate-600 space-y-3 ml-4">
                                            <li><strong className="text-slate-700">Branchez</strong> votre calculatrice à votre ordinateur.</li>
                                            <li>Sur la calculatrice, choisissez <strong className="text-slate-700">Connexion USB : Clé USB</strong>.</li>
                                            <li>Ouvrez ce lecteur depuis votre ordinateur, et <strong>glissez-déposez</strong> les fichiers dans le dossier principal.</li>
                                            <li>Déconnectez proprement le câble. Allez dans le menu "Mémoire" pour lire vos cours !</li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                          </div>
                        )}

                        {currentView === 'terms' && (
                          <div className="space-y-8 animate-in fade-in duration-300 max-w-4xl mx-auto">
                            <h1 className="text-3xl font-extrabold text-slate-900 flex items-center">
                                <div className="bg-blue-100 p-3 rounded-xl mr-4"><Shield className="w-8 h-8 text-blue-600"/></div> Conditions d'utilisations
                            </h1>
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 sm:p-10 space-y-6 text-slate-600 leading-relaxed">
                                <p className="text-lg text-slate-800 font-medium pb-4 border-b border-slate-100">Bienvenue sur WorksBox. En utilisant ce site, vous acceptez les conditions suivantes :</p>
                                <div><h3 className="text-lg font-bold text-slate-800 mb-2 mt-4">1. Partage et usage des ressources</h3><p>Les cours sont destinés à un usage strictement éducatif et personnel. Il est de votre responsabilité de respecter le règlement de votre établissement scolaire.</p></div>
                                <div><h3 className="text-lg font-bold text-slate-800 mb-2 mt-4">2. Exactitude et qualité</h3><p>C'est à chaque élève de confronter ces ressources avec les cours officiels dispensés par ses professeurs.</p></div>
                                <div><h3 className="text-lg font-bold text-slate-800 mb-2 mt-4">3. Hébergement des fichiers</h3><p>Les fichiers sont hébergés de manière externe (via Google Drive). WorksBox agit uniquement comme un annuaire.</p></div>
                            </div>
                          </div>
                        )}
                    </>
                )}
              </main>

              {previewData && <PreviewModal data={previewData} onClose={() => setPreviewData(null)} />}
            </div>
          );
        }

        function ChapterBlock({ chapter, chapterCourses, handleView, tagColors }) {
            const [isExpanded, setIsExpanded] = useState(chapterCourses.length <= 1);
            return (
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div className="bg-slate-50 border-b border-slate-200 px-4 sm:px-6 py-4 cursor-pointer hover:bg-slate-100 transition-colors flex justify-between items-center" onClick={() => setIsExpanded(!isExpanded)}>
                        <div className="flex items-center flex-1 min-w-0">
                            <h2 className="text-xl font-bold text-slate-800 flex items-center truncate">
                                <span className="bg-blue-100 text-blue-700 w-8 h-8 rounded-lg flex items-center justify-center mr-3 text-sm flex-shrink-0">CH</span>
                                <span className="truncate">{chapter}</span>
                            </h2>
                            <span className="hidden sm:inline-block ml-3 text-sm font-medium text-slate-500 bg-white px-2.5 py-0.5 rounded-full border border-slate-200 whitespace-nowrap">
                                {chapterCourses.length} document{chapterCourses.length > 1 ? 's' : ''}
                            </span>
                        </div>
                        <button className="text-slate-400 hover:text-slate-600 transition-colors ml-4">
                            {isExpanded ? <ChevronUp className="w-6 h-6" /> : <ChevronDown className="w-6 h-6" />}
                        </button>
                    </div>
                    {isExpanded && (
                        <ul className="divide-y divide-slate-100 animate-in slide-in-from-top-2 duration-200">
                            {chapterCourses.map((course) => {
                                const courseTag = course.tag || 'Cours';
                                const style = COLOR_PALETTES[tagColors?.[courseTag]] || COLOR_PALETTES.slate;
                                return (
                                    <li key={course.id} className="p-4 sm:p-6 hover:bg-slate-50 transition-colors flex flex-col xl:flex-row xl:items-center justify-between gap-4">
                                        <div className="flex items-start space-x-4 flex-1 min-w-0">
                                            <div className="mt-1 text-slate-400 flex-shrink-0"><FileText className="w-6 h-6" /></div>
                                            <div className="min-w-0">
                                                <div className="flex items-center space-x-2 flex-wrap gap-y-1">
                                                    <h4 className="text-lg font-semibold text-slate-900 truncate">{course.title}</h4>
                                                    <span className={`text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider ${style}`}>{courseTag}</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex items-center space-x-3 ml-10 sm:ml-0 flex-wrap gap-y-2 flex-shrink-0">
                                            {course.digitalLink && (
                                                <button onClick={() => handleView(course, 'Numérique')} className="flex items-center space-x-2 px-3 sm:px-4 py-2 bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 rounded-lg text-sm font-medium transition-colors">
                                                    <Eye className="w-4 h-4" /><span className="hidden sm:inline">Visualiser PDF</span><span className="sm:hidden">PDF</span>
                                                </button>
                                            )}
                                            {course.casioLink && (
                                                <button onClick={() => handleView(course, 'Casio')} className="flex items-center space-x-2 px-3 sm:px-4 py-2 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border border-emerald-200 rounded-lg text-sm font-medium transition-colors">
                                                    <Calculator className="w-4 h-4" /><span className="hidden sm:inline">Version Casio</span><span className="sm:hidden">Casio</span>
                                                </button>
                                            )}
                                        </div>
                                    </li>
                                );
                            })}
                        </ul>
                    )}
                </div>
            );
        }

        function PreviewModal({ data, onClose }) {
            let previewUrl = data.link;
            if (previewUrl.includes('drive.google.com/file/d/')) previewUrl = previewUrl.replace(/\/view.*$/, '/preview');
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-8 bg-slate-900/80 backdrop-blur-sm animate-in fade-in duration-200">
                    <div className="bg-white rounded-2xl shadow-2xl w-full h-full max-w-6xl flex flex-col overflow-hidden animate-in zoom-in-95 duration-200">
                        <div className="flex justify-between items-center px-4 py-3 sm:px-6 sm:py-4 border-b border-slate-200 bg-slate-50 flex-shrink-0">
                            <div className="flex items-center flex-1 min-w-0 pr-4">
                                <FileText className="w-5 h-5 text-blue-600 mr-2 flex-shrink-0" />
                                <h2 className="text-lg font-bold text-slate-800 truncate">{data.title} <span className="text-sm font-normal text-slate-500 ml-2">({data.type})</span></h2>
                            </div>
                            <div className="flex items-center space-x-2 sm:space-x-4 flex-shrink-0">
                                <a href={data.link} target="_blank" rel="noopener noreferrer" className="flex items-center space-x-1 px-3 py-1.5 text-sm font-medium text-slate-700 bg-white border border-slate-300 hover:bg-slate-50 rounded-lg transition-colors shadow-sm">
                                    <ExternalLink className="w-4 h-4" /><span className="hidden sm:inline">Ouvrir dans Drive</span>
                                </a>
                                <button onClick={onClose} className="text-slate-400 hover:text-slate-700 bg-slate-200/50 hover:bg-slate-200 p-1.5 rounded-lg transition-colors"><X className="w-6 h-6" /></button>
                            </div>
                        </div>
                        <div className="flex-1 bg-slate-200 relative">
                            <iframe src={previewUrl} className="absolute inset-0 w-full h-full border-0" title={`Aperçu de ${data.title}`} allow="autoplay"></iframe>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
